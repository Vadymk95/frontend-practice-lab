<!doctype html>
<html lang="ru">
    <!-- lang attribute will be updated dynamically by i18next -->
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/vite.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
        <title>InterviewOS</title>
        <!-- Add meta tags for your project when needed: -->
        <!-- <meta name="description" content="Personal frontend interview prep tool" /> -->
        <!-- <meta name="robots" content="index, follow" /> -->

        <!-- Inter Font is downloaded and bundled by vite-plugin-webfont-dl -->

        <script>
            (function () {
                try {
                    var raw = localStorage.getItem('ios_theme');
                    var t = raw ? raw.replace(/^"|"$/g, '') : null;
                    if (t !== 'light') document.documentElement.classList.add('dark');
                } catch (e) {}
            })();
        </script>

        <!-- GA:START -->
        <!-- Google Analytics — stripped at build time when VITE_GA_ID is unset -->
        <script async src="https://www.googletagmanager.com/gtag/js?id=%VITE_GA_ID%"></script>
        <script>
            window.dataLayer = window.dataLayer || [];
            function gtag() {
                dataLayer.push(arguments);
            }
            gtag('js', new Date());
            gtag('config', '%VITE_GA_ID%');
        </script>
        <!-- GA:END -->
    </head>
    <body>
        <div id="root" class="root-container"></div>

        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
