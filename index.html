<!doctype html>
<html lang="ru">
    <!-- lang attribute will be updated dynamically by i18next -->
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
        <title>InterviewOS</title>
        <meta
            name="description"
            content="Frontend interview preparation — bilingual RU/EN question bank with adaptive practice sessions."
        />

        <link rel="icon" type="image/png" sizes="192x192" href="/icons/192x192.png" />
        <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />

        <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
        <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />

        <!-- iOS PWA: both tags ship — legacy apple-* still required for Safari splash (Firtman). -->
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="default" />
        <meta name="apple-mobile-web-app-title" content="InterviewOS" />

        <!-- Inter Font is downloaded and bundled by vite-plugin-webfont-dl -->

        <script>
            (function () {
                try {
                    var raw = localStorage.getItem('ios_theme');
                    var t = raw ? raw.replace(/^"|"$/g, '') : null;
                    if (t !== 'light') document.documentElement.classList.add('dark');
                } catch (e) {}
            })();
        </script>

        <!-- GA:START -->
        <!-- Google Analytics — stripped at build time when VITE_GA_ID is unset -->
        <script async src="https://www.googletagmanager.com/gtag/js?id=%VITE_GA_ID%"></script>
        <script>
            window.dataLayer = window.dataLayer || [];
            function gtag() {
                dataLayer.push(arguments);
            }
            gtag('js', new Date());
            gtag('config', '%VITE_GA_ID%');
        </script>
        <!-- GA:END -->
    </head>
    <body>
        <div id="root" class="root-container"></div>

        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
